<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Отчёт по приходам | Procurement Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">📦 Procurement Monitor</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
                <li class="nav-item"><a class="nav-link active" href="/purchases">📥 Закупки</a></li>
                <li class="nav-item"><a class="nav-link" href="/sales">📤 Продажи</a></li>
            </ul>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3 text-white-50">
                    <i class="bi bi-person-circle"></i> <span sec:authentication="name">Пользователь</span>
                </span>
                <a href="/auth/logout" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Выйти
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📊 Отчёт по приходам</h2>
        <a href="/goods-receipts" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Назад
        </a>
    </div>

    <!-- Форма выбора периода -->
    <div class="card mb-4">
        <div class="card-body">
            <form method="get" class="row g-3">
                <div class="col-md-3">
                    <label for="startDate" class="form-label">Начало периода</label>
                    <input type="date" class="form-control" id="startDate" name="startDate"
                           th:value="${startDate}">
                </div>
                <div class="col-md-3">
                    <label for="endDate" class="form-label">Конец периода</label>
                    <input type="date" class="form-control" id="endDate" name="endDate"
                           th:value="${endDate}">
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-search"></i> Показать
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Итоговая статистика -->
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card bg-success text-white">
                <div class="card-body">
                    <h5 class="card-title">Общая сумма приходов</h5>
                    <h2 th:text="'₽' + ${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 2, 'POINT')}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card bg-info text-white">
                <div class="card-body">
                    <h5 class="card-title">Количество приходов</h5>
                    <h2 th:text="${receipts.size()}">0</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- Таблица приходов -->
    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>Номер</th>
                <th>Заказ</th>
                <th>Поставщик</th>
                <th>Дата</th>
                <th>Сумма</th>
                <th>Статус</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="receipt : ${receipts}">
                <td th:text="${receipt.receiptNumber}">ПН-2026-0001</td>
                <td th:text="${receipt.purchaseOrder.orderNumber}">PO-2026-0001</td>
                <td th:text="${receipt.supplier.name}">Поставщик</td>
                <td th:text="${#temporals.format(receipt.receiptDate, 'dd.MM.yyyy')}">01.01.2024</td>
                <td th:text="'₽' + ${#numbers.formatDecimal(receipt.totalAmount, 0, 'COMMA', 2, 'POINT')}">0</td>
                <td>
                    <span class="badge"
                          th:class="${receipt.status.name() == 'CONFIRMED' ? 'bg-success' :
                                    receipt.status.name() == 'DRAFT' ? 'bg-secondary' :
                                    receipt.status.name() == 'PARTIAL' ? 'bg-warning text-dark' : 'bg-danger'}">
                        <span th:text="${receipt.status.displayName}">Статус</span>
                    </span>
                </td>
            </tr>
            <tr th:if="${receipts.isEmpty()}">
                <td colspan="6" class="text-center text-muted py-4">
                    <i class="bi bi-info-circle"></i> Нет приходов за выбранный период
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
