<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Приход товаров</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>📦 Приход товаров</h2>
    <div class="alert alert-info">
        <p>Количество приходов: <strong th:text="${receipts.size()}">0</strong></p>
    </div>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Номер</th>
            <th>Заказ</th>
            <th>Поставщик</th>
            <th>Дата</th>
            <th>Сумма</th>
            <th>Статус</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="receipt : ${receipts}">
            <td th:text="${receipt.receiptNumber}">ПН-001</td>
            <td th:text="${receipt.purchaseOrder.orderNumber}">PO-001</td>
            <td th:text="${receipt.supplier.name}">Поставщик</td>
            <td th:text="${#temporals.format(receipt.receiptDate, 'dd.MM.yyyy')}">01.01.2024</td>
            <td th:text="${receipt.totalAmount}">0</td>
            <td th:text="${receipt.status.displayName}">Статус</td>
        </tr>
        <tr th:if="${receipts.isEmpty()}">
            <td colspan="6" class="text-center">Нет приходов</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
