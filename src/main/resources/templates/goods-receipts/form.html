<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Редактирование прихода | Procurement Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">📦 Procurement Monitor</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
                <li class="nav-item"><a class="nav-link active" href="/purchases">📥 Закупки</a></li>
                <li class="nav-item"><a class="nav-link" href="/sales">📤 Продажи</a></li>
            </ul>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3 text-white-50" sec:authentication="name">
                    <i class="bi bi-person-circle"></i> <span sec:authentication="name">Пользователь</span>
                </span>
                <a href="/auth/logout" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Выйти
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📝 Редактирование прихода</h2>
        <div>
            <a href="/goods-receipts" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Назад
            </a>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <!-- Информация о приходе -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <strong>Номер:</strong>
                    <span th:text="${receipt.receiptNumber}">ПН-2026-0001</span>
                </div>
                <div class="col-md-3">
                    <strong>Заказ:</strong>
                    <span th:text="${receipt.purchaseOrder.orderNumber}">PO-2026-0001</span>
                </div>
                <div class="col-md-3">
                    <strong>Поставщик:</strong>
                    <span th:text="${receipt.supplier.name}">Поставщик</span>
                </div>
                <div class="col-md-3">
                    <strong>Статус:</strong>
                    <span class="badge"
                          th:class="${receipt.status.name() == 'CONFIRMED' ? 'bg-success' :
                                    receipt.status.name() == 'DRAFT' ? 'bg-secondary' :
                                    receipt.status.name() == 'PARTIAL' ? 'bg-warning' : 'bg-danger'}">
                        <span th:text="${receipt.status.displayName}">Статус</span>
                    </span>
                </div>
            </div>

            <!-- Форма редактирования -->
            <form method="post" th:action="@{/goods-receipts/confirm/{id}(id=${receipt.id})}">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead class="table-dark">
                        <tr>
                            <th>Артикул</th>
                            <th>Товар</th>
                            <th>Заказано</th>
                            <th>Фактически получено</th>
                            <th>Себестоимость</th>
                            <th>Сумма</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${receipt.items}">
                            <td th:text="${item.product.sku}">SKU</td>
                            <td th:text="${item.product.name}">Название</td>
                            <td th:text="${item.orderedQuantity}">0</td>
                            <td>
                                <input type="number"
                                       class="form-control form-control-sm"
                                       th:name="'quantity_' + ${item.id}"
                                       th:value="${item.receivedQuantity}"
                                       min="0"
                                       style="width: 100px;"
                                       th:disabled="${receipt.status == 'CONFIRMED' || receipt.status == 'CANCELLED'}">
                            </td>
                            <td>
                                <input type="number"
                                       class="form-control form-control-sm"
                                       th:name="'cost_' + ${item.id}"
                                       th:value="${item.costPrice}"
                                       step="0.01"
                                       min="0"
                                       style="width: 120px;"
                                       th:disabled="${receipt.status == 'CONFIRMED' || receipt.status == 'CANCELLED'}">
                            </td>
                            <td th:text="'₽' + ${#numbers.formatDecimal(item.totalCost, 0, 'COMMA', 2, 'POINT')}">
                                0
                            </td>
                        </tr>
                        </tbody>
                        <tfoot>
                        <tr class="table-info">
                            <td colspan="5" class="text-end fw-bold">Итого:</td>
                            <td class="fw-bold" th:text="'₽' + ${#numbers.formatDecimal(receipt.totalAmount, 0, 'COMMA', 2, 'POINT')}">
                                0
                            </td>
                        </tr>
                        </tfoot>
                    </table>
                </div>

                <div class="mt-3">
                    <button type="submit" class="btn btn-success"
                            th:if="${receipt.status != 'CONFIRMED' && receipt.status != 'CANCELLED'}">
                        <i class="bi bi-check2-circle"></i> Подтвердить приход
                    </button>
                    <a href="/goods-receipts" class="btn btn-outline-secondary ms-2">
                        <i class="bi bi-x-circle"></i> Отмена
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
