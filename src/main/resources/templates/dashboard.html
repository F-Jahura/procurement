<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная | Procurement Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">📦 Procurement Monitor</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/">Главная</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/suppliers">Поставщики</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/products">Товары</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/orders">Заказы</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="mb-4">📊 Панель управления</h1>

    <div class="row g-4">
        <!-- Карточка: Поставщики -->
        <div class="col-md-3">
            <div class="card text-white bg-primary h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title">Поставщики</h6>
                            <h2 class="display-4" th:text="${stats.suppliersCount}">0</h2>
                        </div>
                        <i class="bi bi-people display-1 opacity-50"></i>
                    </div>
                    <a href="/suppliers" class="text-white text-decoration-none">Перейти →</a>
                </div>
            </div>
        </div>

        <!-- Карточка: Товары -->
        <div class="col-md-3">
            <div class="card text-white bg-success h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title">Товары</h6>
                            <h2 class="display-4" th:text="${stats.productsCount}">0</h2>
                        </div>
                        <i class="bi bi-box-seam display-1 opacity-50"></i>
                    </div>
                    <a href="/products" class="text-white text-decoration-none">Перейти →</a>
                </div>
            </div>
        </div>

        <!-- Карточка: Активные заказы -->
        <div class="col-md-3">
            <div class="card text-white bg-warning h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title">Активные заказы</h6>
                            <h2 class="display-4" th:text="${stats.activeOrdersCount}">0</h2>
                        </div>
                        <i class="bi bi-truck display-1 opacity-50"></i>
                    </div>
                    <a href="/orders" class="text-white text-decoration-none">Перейти →</a>
                </div>
            </div>
        </div>

        <!-- Карточка: Сумма заказов -->
        <div class="col-md-3">
            <div class="card text-white bg-danger h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title">Сумма заказов</h6>
                            <h2 class="display-4" th:text="${#numbers.formatDecimal(stats.totalOrdersAmount, 0, 'COMMA', 2, 'POINT')}">0</h2>
                        </div>
                        <i class="bi bi-currency-dollar display-1 opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Быстрые действия -->
    <div class="row mt-5">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">🚀 Быстрые действия</h5>
                </div>
                <div class="card-body">
                    <a href="/suppliers/new" class="btn btn-outline-primary me-2">
                        <i class="bi bi-plus-circle"></i> Добавить поставщика
                    </a>
                    <a href="/products/new" class="btn btn-outline-success me-2">
                        <i class="bi bi-plus-circle"></i> Добавить товар
                    </a>
                    <a href="/orders/new" class="btn btn-outline-warning">
                        <i class="bi bi-plus-circle"></i> Создать заказ
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
