<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${supplier.id != null} ? 'Редактировать поставщика' : 'Новый поставщик'">Форма поставщика | Procurement Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">📦 Procurement Monitor</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
                <li class="nav-item"><a class="nav-link active" href="/purchases">📥 Закупки</a></li>
                <li class="nav-item"><a class="nav-link" href="/sales">📤 Продажи</a></li>
            </ul>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3 text-white-50" sec:authentication="name">
                    <i class="bi bi-person-circle"></i> <span sec:authentication="name">Пользователь</span>
                </span>
                <a href="/auth/logout" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Выйти
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 th:text="${supplier.id != null} ? '✏️ Редактировать поставщика' : '➕ Новый поставщик'">Форма поставщика</h2>
        <a href="/suppliers" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Назад к списку
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="${supplier.id != null} ? @{/suppliers/update/{id}(id=${supplier.id})} : @{/suppliers}" method="post">
                <input type="hidden" name="id" th:field="${supplier.id}">

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="name" class="form-label">Название *</label>
                            <input type="text" class="form-control" id="name" name="name"
                                   th:field="${supplier.name}" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="country" class="form-label">Страна</label>
                            <input type="text" class="form-control" id="country" name="country"
                                   th:field="${supplier.country}" placeholder="Например: Россия">
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="contactPerson" class="form-label">Контактное лицо</label>
                            <input type="text" class="form-control" id="contactPerson" name="contactPerson"
                                   th:field="${supplier.contactPerson}" placeholder="ФИО контактного лица">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email"
                                   th:field="${supplier.email}" placeholder="example@mail.com">
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="phone" class="form-label">Телефон</label>
                            <input type="text" class="form-control" id="phone" name="phone"
                                   th:field="${supplier.phone}" placeholder="+7 (123) 456-78-90">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="taxId" class="form-label">ИНН</label>
                            <input type="text" class="form-control" id="taxId" name="taxId"
                                   th:field="${supplier.taxId}" placeholder="ИНН поставщика">
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="address" class="form-label">Адрес</label>
                    <textarea class="form-control" id="address" name="address" rows="2"
                              th:field="${supplier.address}" placeholder="Введите полный адрес..."></textarea>
                </div>

                <div class="mb-3">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="active" name="active"
                               th:field="${supplier.active}" th:checked="${supplier.active}">
                        <label class="form-check-label" for="active">
                            <span class="badge bg-success">Активен</span>
                        </label>
                        <small class="text-muted ms-2">Если не активно, поставщик не будет отображаться в списках</small>
                    </div>
                </div>

                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> Сохранить
                    </button>
                    <a href="/suppliers" class="btn btn-secondary">
                        <i class="bi bi-x-lg"></i> Отмена
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
