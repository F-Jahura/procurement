<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Поставщик</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2 th:text="${supplier.id} ? 'Редактировать поставщика' : 'Новый поставщик'">Форма</h2>

    <form th:action="${supplier.id} ? @{/suppliers/update/{id}(id=${supplier.id})} : @{/suppliers}"
          th:object="${supplier}" method="post">

        <div class="mb-3">
            <label for="name" class="form-label">Название</label>
            <input type="text" class="form-control" id="name" th:field="*{name}" required>
        </div>

        <div class="mb-3">
            <label for="country" class="form-label">Страна</label>
            <input type="text" class="form-control" id="country" th:field="*{country}">
        </div>

        <div class="mb-3">
            <label for="contactPerson" class="form-label">Контактное лицо</label>
            <input type="text" class="form-control" id="contactPerson" th:field="*{contactPerson}">
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" th:field="*{email}">
        </div>

        <div class="mb-3">
            <label for="phone" class="form-label">Телефон</label>
            <input type="text" class="form-control" id="phone" th:field="*{phone}">
        </div>

        <div class="mb-3">
            <label for="address" class="form-label">Адрес</label>
            <textarea class="form-control" id="address" th:field="*{address}" rows="2"></textarea>
        </div>

        <div class="mb-3">
            <label for="taxId" class="form-label">ИНН</label>
            <input type="text" class="form-control" id="taxId" th:field="*{taxId}">
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="active" th:field="*{active}">
            <label class="form-check-label" for="active">Активен</label>
        </div>

        <button type="submit" class="btn btn-success">Сохранить</button>
        <a href="/suppliers" class="btn btn-secondary">Отмена</a>
    </form>
</div>
</body>
</html>
