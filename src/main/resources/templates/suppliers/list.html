<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Поставщики | Procurement Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">📦 Procurement Monitor</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
                <li class="nav-item"><a class="nav-link active" href="/suppliers">Поставщики</a></li>
                <li class="nav-item"><a class="nav-link" href="/products">Товары</a></li>
                <li class="nav-item"><a class="nav-link" href="/orders">Заказы</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>🏢 Поставщики</h2>
        <a href="/suppliers/new" class="btn btn-primary">➕ Добавить поставщика</a>
    </div>

    <!-- Форма фильтров -->
    <div class="card mb-4">
        <div class="card-body">
            <form method="get" action="/suppliers" class="row g-3">
                <div class="col-md-3">
                    <label for="name" class="form-label">Поиск по названию</label>
                    <input type="text" class="form-control" id="name" name="name"
                           th:value="${filter != null ? filter.name : ''}"
                           placeholder="Введите название...">
                </div>
                <div class="col-md-3">
                    <label for="country" class="form-label">Страна</label>
                    <select class="form-select" id="country" name="country">
                        <option value="">Все страны</option>
                        <option th:each="c : ${countries}"
                                th:value="${c}"
                                th:text="${c}"
                                th:selected="${filter != null && filter.country != null && filter.country == c}">
                        </option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="active" class="form-label">Статус</label>
                    <select class="form-select" id="active" name="active">
                        <option value="">Все</option>
                        <option value="true" th:selected="${filter != null && filter.active != null && filter.active == true}">Активен</option>
                        <option value="false" th:selected="${filter != null && filter.active != null && filter.active == false}">Неактивен</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-search"></i> Найти
                    </button>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <a href="/suppliers" class="btn btn-outline-secondary w-100">
                        <i class="bi bi-arrow-clockwise"></i> Сбросить
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Таблица поставщиков -->
    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Страна</th>
                <th>Контакт</th>
                <th>Email</th>
                <th>Телефон</th>
                <th>Статус</th>
                <th>Дата создания</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${suppliers}">
                <td th:text="${s.id}">1</td>
                <td th:text="${s.name}">Имя</td>
                <td th:text="${s.country}">Страна</td>
                <td th:text="${s.contactPerson}">Контакт</td>
                <td th:text="${s.email}">Email</td>
                <td th:text="${s.phone}">Телефон</td>
                <td>
                            <span class="badge" th:class="${s.active} ? 'bg-success' : 'bg-danger'"
                                  th:text="${s.active} ? 'Активен' : 'Неактивен'">
                            </span>
                </td>
                <td th:text="${#temporals.format(s.createdAt, 'dd.MM.yyyy')}">01.01.2024</td>
                <td>
                    <a th:href="@{/suppliers/edit/{id}(id=${s.id})}" class="btn btn-sm btn-warning">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a th:href="@{/suppliers/delete/{id}(id=${s.id})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Удалить поставщика?')">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${suppliers.isEmpty()}">
                <td colspan="9" class="text-center text-muted py-4">
                    <i class="bi bi-info-circle"></i> Нет поставщиков. Добавьте первого!
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
