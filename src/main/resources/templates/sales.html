<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Продажи | Procurement Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">📦 Procurement Monitor</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
                <li class="nav-item"><a class="nav-link" href="/purchases">📥 Закупки</a></li>
                <li class="nav-item"><a class="nav-link active" href="/sales">📤 Продажи</a></li>
            </ul>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3 text-white-50" sec:authentication="name">
                    <i class="bi bi-person-circle"></i> <span sec:authentication="name">Пользователь</span>
                </span>
                <a href="/auth/logout" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Выйти
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">📤 Продажи</h2>

    <div class="row g-4">
        <!-- Товары -->
        <div class="col-md-4">
            <div class="card h-100 shadow-sm border-success">
                <div class="card-body text-center py-4">
                    <div class="display-4 text-success mb-3">
                        <i class="bi bi-box-seam"></i>
                    </div>
                    <h5 class="card-title">Товары</h5>
                    <p class="card-text text-muted small">
                        Просмотр товаров для продажи
                    </p>
                    <a href="/sales/products" class="btn btn-outline-success btn-sm">
                        Перейти <i class="bi bi-arrow-right"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- Активные заказы -->
        <div class="col-md-4">
            <div class="card h-100 shadow-sm border-primary">
                <div class="card-body text-center py-4">
                    <div class="display-4 text-primary mb-3">
                        <i class="bi bi-list-check"></i>
                    </div>
                    <h5 class="card-title">Активные заказы</h5>
                    <p class="card-text text-muted small">
                        Просмотр активных заказов
                    </p>
                    <a href="/sales/orders" class="btn btn-outline-primary btn-sm">
                        Перейти <i class="bi bi-arrow-right"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- Отчёты -->
        <div class="col-md-4">
            <div class="card h-100 shadow-sm border-info">
                <div class="card-body text-center py-4">
                    <div class="display-4 text-info mb-3">
                        <i class="bi bi-bar-chart"></i>
                    </div>
                    <h5 class="card-title">Отчёты</h5>
                    <p class="card-text text-muted small">
                        Аналитика и отчёты по продажам
                    </p>
                    <a href="/sales/reports" class="btn btn-outline-info btn-sm">
                        Перейти <i class="bi bi-arrow-right"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
