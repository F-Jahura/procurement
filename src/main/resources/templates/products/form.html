<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Товар | Procurement Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">📦 Procurement Monitor</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
                <li class="nav-item"><a class="nav-link" href="/suppliers">Поставщики</a></li>
                <li class="nav-item"><a class="nav-link active" href="/products">Товары</a></li>
                <li class="nav-item"><a class="nav-link" href="/orders">Заказы</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 th:text="${product.id} ? 'Редактировать товар' : 'Новый товар'">Форма</h2>

    <form th:action="${product.id} ? @{/products/update/{id}(id=${product.id})} : @{/products}"
          th:object="${product}" method="post" class="mt-4">

        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="name" class="form-label">Название *</label>
                    <input type="text" class="form-control" id="name" th:field="*{name}" required>
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="sku" class="form-label">Артикул</label>
                    <input type="text" class="form-control" id="sku" th:field="*{sku}">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="price" class="form-label">Цена *</label>
                    <input type="number" step="0.01" class="form-control" id="price" th:field="*{price}" required>
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="supplierId" class="form-label">Поставщик</label>
                    <select class="form-select" id="supplierId" name="supplierId">
                        <option value="">Выберите поставщика</option>
                        <option th:each="s : ${suppliers}"
                                th:value="${s.id}"
                                th:text="${s.name}"
                                th:selected="${product.supplier != null && product.supplier.id == s.id}">
                            Поставщик
                        </option>
                    </select>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="mb-3">
                    <label for="minStock" class="form-label">Минимальный остаток</label>
                    <input type="number" class="form-control" id="minStock" th:field="*{minStock}">
                </div>
            </div>
            <div class="col-md-4">
                <div class="mb-3">
                    <label for="currentStock" class="form-label">Текущий остаток</label>
                    <input type="number" class="form-control" id="currentStock" th:field="*{currentStock}">
                </div>
            </div>
            <div class="col-md-4">
                <div class="mb-3">
                    <label for="unit" class="form-label">Ед. измерения</label>
                    <input type="text" class="form-control" id="unit" th:field="*{unit}" placeholder="шт, кг, м...">
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Описание</label>
            <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
        </div>

        <button type="submit" class="btn btn-success">
            <i class="bi bi-check2"></i> Сохранить
        </button>
        <a href="/products" class="btn btn-secondary">
            <i class="bi bi-x"></i> Отмена
        </a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
