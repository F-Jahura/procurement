<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.id != null} ? 'Редактировать товар' : 'Новый товар'">Форма товара | Procurement Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">📦 Procurement Monitor</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
                <li class="nav-item"><a class="nav-link active" href="/purchases">📥 Закупки</a></li>
                <li class="nav-item"><a class="nav-link" href="/sales">📤 Продажи</a></li>
            </ul>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3 text-white-50" sec:authentication="name">
                    <i class="bi bi-person-circle"></i> <span sec:authentication="name">Пользователь</span>
                </span>
                <a href="/auth/logout" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Выйти
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 th:text="${product.id != null} ? '✏️ Редактировать товар' : '➕ Новый товар'">Форма товара</h2>
        <a href="/products" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Назад к списку
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="${product.id != null} ? @{/products/update/{id}(id=${product.id})} : @{/products}" method="post">
                <input type="hidden" name="id" th:field="${product.id}">

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="name" class="form-label">Название *</label>
                            <input type="text" class="form-control" id="name" name="name"
                                   th:field="${product.name}" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="sku" class="form-label">Артикул (SKU)</label>
                            <input type="text" class="form-control" id="sku" name="sku"
                                   th:field="${product.sku}" placeholder="Например: PH-001">
                            <small class="text-muted">Уникальный идентификатор товара</small>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Описание</label>
                    <textarea class="form-control" id="description" name="description" rows="3"
                              th:field="${product.description}"></textarea>
                </div>

                <div class="row">
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="costPrice" class="form-label">Себестоимость *</label>
                            <input type="number" step="0.01" class="form-control" id="costPrice" name="costPrice"
                                   th:field="${product.costPrice}" required>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="sellingPrice" class="form-label">Продажная цена</label>
                            <input type="number" step="0.01" class="form-control" id="sellingPrice" name="sellingPrice"
                                   th:field="${product.sellingPrice}" readonly>
                            <small class="text-muted">Рассчитывается автоматически</small>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="unit" class="form-label">Единица измерения</label>
                            <input type="text" class="form-control" id="unit" name="unit"
                                   th:field="${product.unit}" placeholder="шт, кг, л...">
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="currentStock" class="form-label">Текущий остаток</label>
                            <input type="number" class="form-control" id="currentStock" name="currentStock"
                                   th:field="${product.currentStock}" min="0">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="minStock" class="form-label">Минимальный остаток</label>
                            <input type="number" class="form-control" id="minStock" name="minStock"
                                   th:field="${product.minStock}" min="0">
                            <small class="text-muted">При остатке ниже этого значения будет "Критично!"</small>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="supplierId" class="form-label">Поставщик</label>
                            <select class="form-select" id="supplierId" name="supplierId">
                                <option value="">Выберите поставщика</option>
                                <option th:each="s : ${suppliers}"
                                        th:value="${s.id}"
                                        th:text="${s.name}"
                                        th:selected="${product.supplier != null && product.supplier.id == s.id}">
                                </option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> Сохранить
                    </button>
                    <a href="/products" class="btn btn-secondary">
                        <i class="bi bi-x-lg"></i> Отмена
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
