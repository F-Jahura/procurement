<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Товары | Procurement Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">📦 Procurement Monitor</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
                <li class="nav-item"><a class="nav-link" href="/suppliers">Поставщики</a></li>
                <li class="nav-item"><a class="nav-link active" href="/products">Товары</a></li>
                <li class="nav-item"><a class="nav-link" href="/orders">Заказы</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>📦 Товары</h2>
        <a href="/products/new" class="btn btn-primary">➕ Добавить товар</a>
    </div>

    <!-- Форма фильтров -->
    <div class="card mb-4">
        <div class="card-body">
            <form method="get" action="/products" class="row g-3">
                <div class="col-md-3">
                    <label for="name" class="form-label">Поиск по названию</label>
                    <input type="text" class="form-control" id="name" name="name"
                           th:value="${filter != null ? filter.name : ''}"
                           placeholder="Введите название...">
                </div>
                <div class="col-md-3">
                    <label for="supplierId" class="form-label">Поставщик</label>
                    <select class="form-select" id="supplierId" name="supplierId">
                        <option value="">Все поставщики</option>
                        <option th:each="s : ${suppliers}"
                                th:value="${s.id}"
                                th:text="${s.name}"
                                th:selected="${filter != null && filter.supplierId != null && filter.supplierId == s.id}">
                        </option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="minStock" class="form-label">Остаток меньше</label>
                    <input type="number" class="form-control" id="minStock" name="minStock"
                           th:value="${filter != null ? filter.minStock : ''}"
                           placeholder="Например: 10">
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <div class="form-check mb-2">
                        <input type="checkbox" class="form-check-input" id="lowStockOnly" name="lowStockOnly"
                               value="true"
                               th:checked="${filter != null && filter.lowStockOnly != null && filter.lowStockOnly}">
                        <label class="form-check-label" for="lowStockOnly">
                            <i class="bi bi-exclamation-triangle text-danger"></i>
                            Только критические (< 10)
                        </label>
                    </div>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100 me-2">
                        <i class="bi bi-search"></i> Найти
                    </button>
                    <a href="/products" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-clockwise"></i>
                    </a>
                </div>
                <div class="col-md-2">
                    <label for="salesPeriodMonths" class="form-label">Продажи за (мес.)</label>
                    <select class="form-select" id="salesPeriodMonths" name="salesPeriodMonths">
                        <option value="1" th:selected="${filter != null && filter.salesPeriodMonths == 1}">1 месяц</option>
                        <option value="2" th:selected="${filter != null && filter.salesPeriodMonths == 2}">2 месяца</option>
                        <option value="3" th:selected="${filter == null || filter.salesPeriodMonths == null || filter.salesPeriodMonths == 3}">3 месяца</option>
                        <option value="4" th:selected="${filter != null && filter.salesPeriodMonths == 4}">4 месяца</option>
                        <option value="5" th:selected="${filter != null && filter.salesPeriodMonths == 5}">5 месяцев</option>
                        <option value="6" th:selected="${filter != null && filter.salesPeriodMonths == 6}">6 месяцев</option>
                    </select>
                </div>
            </form>
        </div>
    </div>

    <!-- Таблица товаров -->
    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Артикул</th>
                <th>Поставщик</th>
                <th>Цена</th>
                <th>Остаток</th>
                <th>Продажи за период</th>
                <th>Статус остатка</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${products}">
                <td th:text="${p.id}">1</td>
                <td th:text="${p.name}">Название</td>
                <td th:text="${p.sku != null ? p.sku : '-'}">SKU</td>
                <td th:text="${p.supplier != null ? p.supplier.name : '-'}">Поставщик</td>
                <td th:text="'₽' + ${#numbers.formatDecimal(p.price, 0, 'COMMA', 2, 'POINT')}">0</td>
                <td th:text="${p.currentStock != null ? p.currentStock : 0}">0</td>
                <td th:text="${salesMap != null ? salesMap[p.id] : 0}">0</td>
                <td>
                    <span class="badge"
                          th:class="${p.currentStock != null && p.currentStock < 10 ? 'bg-danger' :
                                    p.currentStock != null && p.currentStock < 30 ? 'bg-warning text-dark' : 'bg-success'}">
                        <span th:text="${p.currentStock != null && p.currentStock < 10 ? 'Критично!' :
                                        p.currentStock != null && p.currentStock < 30 ? 'Мало' : 'Норма'}">Норма</span>
                    </span>
                </td>
                <td>
                    <a th:href="@{/products/edit/{id}(id=${p.id})}" class="btn btn-sm btn-warning">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a th:href="@{/products/delete/{id}(id=${p.id})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Удалить товар?')">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${products.isEmpty()}">
                <td colspan="9" class="text-center text-muted py-4">
                    <i class="bi bi-info-circle"></i> Нет товаров. Добавьте первый!
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
