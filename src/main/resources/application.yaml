spring:
  application:
    name: procurement

  profiles:
    active: h2

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml
# ====== НАСТРОЙКИ JWT (ДОБАВЛЕНЫ) ======
app:
  jwtSecret: procurementSecretKey123456789012345678901234567890
  jwtExpirationMs: 86400000  # 24 часа

logging:
  level:
    com.fatema.procurement: DEBUG
    liquibase: INFO

