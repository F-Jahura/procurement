databaseChangeLog:
  - changeSet:
      id: create-receipt-items-table
      author: fatema
      changes:
        - createTable:
            tableName: receipt_items
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: goods_receipt_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: ordered_quantity
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: received_quantity
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: cost_price
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: total_cost
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  update: "ON UPDATE CURRENT_TIMESTAMP"
        - addForeignKeyConstraint:
            baseTableName: receipt_items
            baseColumnNames: goods_receipt_id
            referencedTableName: goods_receipts
            referencedColumnNames: id
            constraintName: fk_receipt_items_goods_receipt
        - addForeignKeyConstraint:
            baseTableName: receipt_items
            baseColumnNames: product_id
            referencedTableName: products
            referencedColumnNames: id
            constraintName: fk_receipt_items_product
