databaseChangeLog:
  - changeSet:
      id: create-goods-receipts-table
      author: fatema
      changes:
        - createTable:
            tableName: goods_receipts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: receipt_number
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: purchase_order_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: supplier_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: receipt_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: received_by
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: total_amount
                  type: DECIMAL(15,2)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  update: "ON UPDATE CURRENT_TIMESTAMP"
        - addForeignKeyConstraint:
            baseTableName: goods_receipts
            baseColumnNames: purchase_order_id
            referencedTableName: purchase_orders
            referencedColumnNames: id
            constraintName: fk_goods_receipts_purchase_order
        - addForeignKeyConstraint:
            baseTableName: goods_receipts
            baseColumnNames: supplier_id
            referencedTableName: suppliers
            referencedColumnNames: id
            constraintName: fk_goods_receipts_supplier
